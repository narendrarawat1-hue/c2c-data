name: C2C Auto Sync

on:
  schedule:
    - cron: '30 3 * * *'   # 9 AM IST
    - cron: '30 4 * * *'   # 10 AM IST
    - cron: '30 5 * * *'   # 11 AM IST
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      TABLEAU_PAT_NAME: ${{ secrets.TABLEAU_PAT_NAME }}
      TABLEAU_PAT: ${{ secrets.TABLEAU_PAT }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # ✅ IMPORTANT

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true   # ✅ ensures push works

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run script
        run: python scripts/c2c_sync.py

      - name: Commit & push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .

          git diff --cached --quiet || git commit -m "Auto-update CSV + HTML"

          git push
