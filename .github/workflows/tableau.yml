name: Tableau Auto Refresh

on:
  schedule:
    - cron: '30 3 * * *'   # 9 AM IST
    - cron: '30 4 * * *'   # 10 AM IST
    - cron: '30 5 * * *'   # 11 AM IST
    - cron: '30 6 * * *'   # 12 PM IST
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      TABLEAU_PAT_NAME: ${{ secrets.TABLEAU_PAT_NAME }}
      TABLEAU_PAT: ${{ secrets.TABLEAU_PAT }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ✅ FIXED HERE (added pandas)
      - name: Install dependencies
        run: pip install requests pandas

      - name: Run script
        run: python aod_claude/main.py

      # 🔥 OPTIONAL (HIGHLY RECOMMENDED)
      # This will push updated CSV + HTML back to repo
      - name: Commit updated files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add output.csv aod_claude/aod_dashboard_v3.html
          git commit -m "Auto update CSV + HTML" || echo "No changes"
          git push
